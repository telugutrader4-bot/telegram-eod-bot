name: Price Action Telugu — Daily Reports

on:
  schedule:
    # ─────────────────────────────────────────────
    # MORNING REPORT — 8:00 AM IST = 2:30 AM UTC
    # ─────────────────────────────────────────────
    - cron: "30 2 * * 1-5"

    # ─────────────────────────────────────────────
    # EOD REPORT — 4:30 PM IST = 11:00 AM UTC
    # ─────────────────────────────────────────────
    - cron: "0 11 * * 1-5"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      report_type:
        description: "Which report to run"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - eod
          - both

jobs:

  # ─────────────────────────────────────────────
  # MORNING REPORT JOB
  # ─────────────────────────────────────────────
  morning-report:
    name: Morning Report (8:00 AM IST)
    runs-on: ubuntu-latest

    # Run on schedule at 2:30 UTC, OR manual trigger for morning/both
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 2 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.report_type == 'morning' || github.event.inputs.report_type == 'both'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Morning Bot
        env:
          BOT_TOKEN:         ${{ secrets.BOT_TOKEN }}
          CHAT_ID:           ${{ secrets.CHAT_ID }}
          DHAN_CLIENT_ID:    ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
        run: python morning_bot.py

  # ─────────────────────────────────────────────
  # EOD REPORT JOB
  # ─────────────────────────────────────────────
  eod-report:
    name: EOD Report (4:30 PM IST)
    runs-on: ubuntu-latest

    # Run on schedule at 11:00 UTC, OR manual trigger for eod/both
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.report_type == 'eod' || github.event.inputs.report_type == 'both'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run EOD Bot
        env:
          BOT_TOKEN:         ${{ secrets.BOT_TOKEN }}
          CHAT_ID:           ${{ secrets.CHAT_ID }}
          DHAN_CLIENT_ID:    ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
        run: python eod_bot.py
