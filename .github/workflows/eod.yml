name: Price Action Telugu — Daily Reports

on:
  schedule:
    # MORNING REPORT — 8:00 AM IST = 2:30 AM UTC
    - cron: "30 2 * * 1-5"
    # EOD REPORT — 4:30 PM IST = 11:00 AM UTC
    - cron: "0 11 * * 1-5"

  workflow_dispatch:

jobs:

  morning-report:
    name: Morning Report (8:00 AM IST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Morning Bot
        env:
          BOT_TOKEN:         ${{ secrets.BOT_TOKEN }}
          CHAT_ID:           ${{ secrets.CHAT_ID }}
          DHAN_CLIENT_ID:    ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
        run: python morning_bot.py

  eod-report:
    name: EOD Report (4:30 PM IST)
    runs-on: ubuntu-latest
    needs: morning-report
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EOD Bot
        env:
          BOT_TOKEN:         ${{ secrets.BOT_TOKEN }}
          CHAT_ID:           ${{ secrets.CHAT_ID }}
          DHAN_CLIENT_ID:    ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
        run: python eod_bot.py
